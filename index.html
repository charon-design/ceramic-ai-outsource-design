    <style>

        @media (max-width: 780px) {

        /* 茶具标签装饰 */

            border-radius: 40px;
            padding: 4px 16px;
            font-size: 13px;
            display: inline-block;
            margin: 4px 4px 0 0;
        }
    </style>

<script>
    (function() {
        const generateBtn = document.getElementById('generateBtn');
        const exportBtn = document.getElementById('exportBtn');
        const fileInput = document.getElementById('fileUpload');
        const promptText = document.getElementById('designPrompt');
        const placeholderBox = document.getElementById('placeholderBox');
        const imagePreviewBox = document.getElementById('imagePreviewBox');
        const previewImg = document.getElementById('previewImage');

        /**
         * 核心：根据描述生成「茶具套装」风格的纹样预览
         * 在画面中绘制茶壶、茶杯、托盘，并将纹样应用在上面
         */
        function generateTeaSetImage(seedText, fileName = '') {
            const canvas = document.createElement('canvas');
            canvas.width = 700;
            canvas.height = 500;
            const ctx = canvas.getContext('2d');

            // 1. 生成种子 (结合文本+文件名)
            const combined = seedText + '|' + fileName;
            let hash = 0;
            for (let i = 0; i < combined.length; i++) {
                const char = combined.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            const seed = Math.abs(hash) / 2147483647; // 0~1

            // 2. 基础色调 (随seed变化)
            const hueBase = (seed * 360) % 360;
            // 主色系 (茶具釉色)
            const mainColor = `hsl(${hueBase}, 55%, 50%)`;
            const accentColor = `hsl(${(hueBase + 40) % 360}, 50%, 60%)`;
            const lightColor = `hsl(${(hueBase + 20) % 360}, 40%, 75%)`;
            const darkColor = `hsl(${(hueBase + 60) % 360}, 45%, 35%)`;
            const colors = [mainColor, accentColor, lightColor, darkColor, '#a8221a', '#b56b3a', '#2d6b4c', '#3a5f8a'];

            // 3. 背景 (仿釉下质感)
            const grad = ctx.createRadialGradient(
                120 + seed * 200, 100 + seed * 150, 40,
                350 + seed * 100, 250 + seed * 80, 450
            );
            const bgLight = `hsl(${40 + seed * 20}, 18%, ${88 + seed * 6}%)`;
            const bgMid = `hsl(${35 + seed * 15}, 15%, ${75 + seed * 8}%)`;
            const bgDark = `hsl(${30 + seed * 10}, 12%, ${60 + seed * 10}%)`;
            grad.addColorStop(0, bgLight);
            grad.addColorStop(0.6, bgMid);
            grad.addColorStop(1, bgDark);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 4. 绘制茶具套装 (茶壶、茶杯、托盘)
            ctx.save();
            ctx.shadowColor = 'rgba(40, 25, 15, 0.25)';
            ctx.shadowBlur = 12;

            // ---- 托盘 (大椭圆) ----
            ctx.beginPath();
            ctx.ellipse(350, 380, 250, 70, 0, 0, Math.PI * 2);
            ctx.fillStyle = `hsl(${(hueBase + 10) % 360}, 25%, 70%)`;
            ctx.globalAlpha = 0.3;
            ctx.fill();
            ctx.strokeStyle = `hsl(${(hueBase + 10) % 360}, 30%, 50%)`;
            ctx.lineWidth = 3;
            ctx.globalAlpha = 0.4;
            ctx.stroke();
            // 托盘内部纹样 (装饰)
            ctx.globalAlpha = 0.25;
            ctx.beginPath();
            ctx.ellipse(350, 380, 200, 40, 0, 0, Math.PI * 2);
            ctx.strokeStyle = `hsl(${(hueBase + 80) % 360}, 40%, 45%)`;
            ctx.lineWidth = 2;
            ctx.stroke();

            // ---- 茶壶 (主体) ----
            ctx.shadowBlur = 14;
            ctx.globalAlpha = 0.9;
            // 壶身 (大圆)
            ctx.beginPath();
            ctx.ellipse(280, 280, 110, 90, 0.05, 0, Math.PI * 2);
            ctx.fillStyle = `hsl(${(hueBase + 20) % 360}, 30%, 75%)`;
            ctx.fill();
            ctx.strokeStyle = `hsl(${(hueBase + 20) % 360}, 40%, 40%)`;
            ctx.lineWidth = 3;
            ctx.stroke();

            // 壶盖
            ctx.beginPath();
            ctx.ellipse(280, 195, 40, 18, 0, 0, Math.PI * 2);
            ctx.fillStyle = `hsl(${(hueBase + 30) % 360}, 25%, 70%)`;
            ctx.fill();
            ctx.stroke();

            // 壶嘴
            ctx.beginPath();
            ctx.moveTo(370, 250);
            ctx.quadraticCurveTo(420, 220, 430, 180);
            ctx.lineWidth = 18;
            ctx.strokeStyle = `hsl(${(hueBase + 20) % 360}, 30%, 70%)`;
            ctx.stroke();
            ctx.lineWidth = 3;
            ctx.strokeStyle = `hsl(${(hueBase + 20) % 360}, 40%, 40%)`;
            ctx.stroke();

            // 壶柄
            ctx.beginPath();
            ctx.ellipse(170, 260, 30, 50, -0.2, 0, Math.PI * 1.8);
            ctx.lineWidth = 16;
            ctx.strokeStyle = `hsl(${(hueBase + 20) % 360}, 30%, 68%)`;
            ctx.stroke();
            ctx.lineWidth = 3;
            ctx.strokeStyle = `hsl(${(hueBase + 20) % 360}, 40%, 40%)`;
            ctx.stroke();

            // ---- 茶杯 (两个) ----
            // 左杯
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.ellipse(150, 350, 40, 30, 0, 0, Math.PI * 2);
            ctx.fillStyle = `hsl(${(hueBase + 40) % 360}, 30%, 78%)`;
            ctx.fill();
            ctx.strokeStyle = `hsl(${(hueBase + 40) % 360}, 40%, 40%)`;
            ctx.lineWidth = 2.5;
            ctx.stroke();
            // 杯耳
            ctx.beginPath();
            ctx.ellipse(110, 340, 12, 20, 0.2, 0, Math.PI * 1.6);
            ctx.lineWidth = 10;
            ctx.strokeStyle = `hsl(${(hueBase + 40) % 360}, 30%, 72%)`;
            ctx.stroke();
            ctx.lineWidth = 2.5;
            ctx.strokeStyle = `hsl(${(hueBase + 40) % 360}, 40%, 40%)`;
            ctx.stroke();

            // 右杯
            ctx.beginPath();
            ctx.ellipse(500, 340, 40, 30, -0.1, 0, Math.PI * 2);
            ctx.fillStyle = `hsl(${(hueBase + 50) % 360}, 30%, 78%)`;
            ctx.fill();
            ctx.strokeStyle = `hsl(${(hueBase + 50) % 360}, 40%, 40%)`;
            ctx.lineWidth = 2.5;
            ctx.stroke();
            ctx.beginPath();
            ctx.ellipse(540, 330, 12, 20, -0.2, 0, Math.PI * 1.6);
            ctx.lineWidth = 10;
            ctx.strokeStyle = `hsl(${(hueBase + 50) % 360}, 30%, 72%)`;
            ctx.stroke();
            ctx.lineWidth = 2.5;
            ctx.strokeStyle = `hsl(${(hueBase + 50) % 360}, 40%, 40%)`;
            ctx.stroke();

            // ---- 在茶具表面绘制纹样 (根据seed和描述) ----
            ctx.restore();
            ctx.save();
            ctx.shadowBlur = 0; // 纹样清晰

            // 在壶身绘制纹样 (用旋转的花卉/祥云)
            const patternCount = 6 + Math.floor(seed * 10);
            const radius = 60 + seed * 30;
            // 壶身中心
            const cx = 280, cy = 280;

            for (let i = 0; i < patternCount; i++) {
                ctx.save();
                const angle = (i / patternCount) * Math.PI * 2 + seed * 0.5;
                const r = radius + Math.sin(seed * 15 + i * 1.2) * 15;
                const x = cx + Math.cos(angle) * r;
                const y = cy + Math.sin(angle) * r * 0.7; // 压扁适配壶身
                ctx.translate(x, y);
                ctx.rotate(angle + seed * 0.6 + i * 0.2);

                const w = 18 + Math.sin(seed * 12 + i * 0.9) * 8;
                const h = 12 + Math.cos(seed * 10 + i * 1.1) * 6;
                ctx.beginPath();
                ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
                const colorIdx = Math.floor((i + seed * 3) % colors.length);
                ctx.fillStyle = colors[colorIdx];
                ctx.globalAlpha = 0.5 + Math.sin(seed * 4 + i) * 0.25;
                ctx.fill();
                ctx.strokeStyle = `hsl(${(hueBase + i * 30) % 360}, 50%, 30%)`;
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // 花蕊
                ctx.beginPath();
                ctx.arc(4 + Math.sin(i) * 4, -3 + Math.cos(i) * 4, 3 + Math.sin(seed * 10 + i) * 2, 0, Math.PI * 2);
                ctx.fillStyle = '#f5e3c1';
                ctx.globalAlpha = 0.6;
                ctx.fill();
                ctx.restore();
            }

            // 在茶杯上添加小纹样 (左杯)
            for (let i = 0; i < 4; i++) {
                ctx.save();
                const angle = i * 1.2 + seed;
                const r = 22;
                const x = 150 + Math.cos(angle) * r;
                const y = 350 + Math.sin(angle) * r * 0.7;
                ctx.translate(x, y);
                ctx.rotate(angle + seed);
                ctx.beginPath();
                ctx.ellipse(0, 0, 10 + Math.sin(i) * 4, 6 + Math.cos(i) * 3, 0, 0, Math.PI * 2);
                ctx.fillStyle = colors[(i + 2) % colors.length];
                ctx.globalAlpha = 0.6;
                ctx.fill();
                ctx.restore();
            }
            // 右杯
            for (let i = 0; i < 4; i++) {
                ctx.save();
                const angle = i * 1.2 + seed + 1.5;
                const r = 22;
                const x = 500 + Math.cos(angle) * r;
                const y = 340 + Math.sin(angle) * r * 0.7;
                ctx.translate(x, y);
                ctx.rotate(angle + seed + 0.5);
                ctx.beginPath();
                ctx.ellipse(0, 0, 10 + Math.cos(i) * 4, 6 + Math.sin(i) * 3, 0, 0, Math.PI * 2);
                ctx.fillStyle = colors[(i + 3) % colors.length];
                ctx.globalAlpha = 0.6;
                ctx.fill();
                ctx.restore();
            }

            // 添加文字水印 (显示描述关键词)
            ctx.restore();
            ctx.save();
            ctx.globalAlpha = 0.15;
            ctx.font = '18px "Microsoft Yahei", sans-serif';
            ctx.fillStyle = `hsl(${(hueBase + 160) % 360}, 30%, 30%)`;
            const shortTag = seedText.trim().slice(0, 8) || '茶具套装';
            ctx.fillText('· ' + shortTag + ' ·', 500, 470);
            ctx.globalAlpha = 0.1;
            ctx.fillText('AI 文创 醴陵 釉下彩', 510, 490);
            ctx.restore();

            // 返回图片数据
            return canvas.toDataURL('image/png');
        }

        // 展示图片
        function showGeneratedImage(seedText, fileName) {
            const dataUrl = generateTeaSetImage(seedText, fileName);
            previewImg.src = dataUrl;
            placeholderBox.style.display = 'none';
            imagePreviewBox.style.display = 'block';
        }

        function resetToPlaceholder() {
            placeholderBox.style.display = 'flex';
            imagePreviewBox.style.display = 'none';
        }

        // ----- 事件绑定 -----
        generateBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const prompt = promptText.value.trim() || '传统祥云牡丹茶具';
            const file = fileInput.files[0];
            const fileName = file ? file.name : '';

            const originalText = generateBtn.innerHTML;
            generateBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 生成茶具套装...';
            generateBtn.disabled = true;

            setTimeout(() => {
                showGeneratedImage(prompt, fileName);
                generateBtn.innerHTML = originalText;
                generateBtn.disabled = false;
            }, 700);
        });

        // 导出
        exportBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (imagePreviewBox.style.display === 'block' && previewImg.src) {
                const link = document.createElement('a');
                link.download = `醴陵茶具套装_AI设计_${new Date().getTime()}.jpg`;
                link.href = previewImg.src;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                alert('✅ 茶具套装商用级图片已导出 (模拟JPG)');
            } else {
                alert('请先点击 "AI生成茶具套装预览" 生成效果图。');
            }
        });

        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                console.log(`参考图: ${this.files[0].name}`);
            }
        });

        // 双击重置
        document.querySelector('.right-preview').addEventListener('dblclick', function(e) {
            if (e.target.closest('.right-preview')) {
                resetToPlaceholder();
            }
        });

        resetToPlaceholder();
        console.log('茶具套装AI生成器已加载 — 根据描述生成差异化茶具纹样预览');
    })();
</script>
</body>
</html>
