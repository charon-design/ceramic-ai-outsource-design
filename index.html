<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>醴陵陶瓷AI文创外包下单平台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft Yahei;}
        .container{width:1200px;margin:30px auto;}
        h1{text-align:center;color:#9c2c20;margin-bottom:30px;}
        .box{display:flex;gap:40px;}
        .left{width:50%;}
        .right{width:50%;border:1px solid #ddd;padding:20px;min-height:400px;}
        textarea,input{width:100%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:4px;}
        button{background:#9c2c20;color:white;border:none;padding:12px 30px;border-radius:4px;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <h1>醴陵釉下彩陶瓷文创外包设计下单系统</h1>
        <div class="box">
            <div class="left">
                <h3>客户需求提交区</h3>
                <textarea placeholder="输入纹样需求：山水花鸟/古风人物/传统祥云等醴陵瓷风格" rows="5"></textarea>
                <input type="file" accept="jpg,png">
                <button>AI生成陶瓷纹样初稿</button>
                <br><br>
                <button>导出印刷CMYK商用成品图</button>
            </div>
            <div class="right">
                <h3>AI纹样预览区</h3>
                <p style="margin-top:20px;color:#888;">生成后的陶瓷纹样、包装效果图展示在此处</p>
            </div>
        </div>
    </div>
</body>
</html>
